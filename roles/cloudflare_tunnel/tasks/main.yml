- name: Cloudflare tunnel installation and service management
  block:
    - name: Read Cloudflare tunnel token from environment
      ansible.builtin.set_fact:
        cloudflare_tunnel_token: "{{ lookup('env', cloudflare_tunnel_token_env_var) | default('', true) }}"
      no_log: true

    - name: Validate Cloudflare tunnel token is present
      ansible.builtin.assert:
        that:
          - cloudflare_tunnel_token | length > 0
        fail_msg: >-
          Missing {{ cloudflare_tunnel_token_env_var }} in the Ansible controller environment.
          Export it locally or expose it in the GitHub workflow before running the cloudflare_tunnel role.
      no_log: true

    - name: Configure Cloudflare apt repository
      ansible.builtin.deb822_repository:
        name: "{{ cloudflare_tunnel_apt_repo_name }}"
        state: present
        types:
          - deb
        uris:
          - "{{ cloudflare_tunnel_apt_repo_uri }}"
        suites:
          - "{{ cloudflare_tunnel_apt_repo_suite }}"
        components: "{{ cloudflare_tunnel_apt_repo_components }}"
        signed_by: "{{ cloudflare_tunnel_apt_repo_signed_by }}"
      register: cloudflare_tunnel_repository_result

    - name: Install cloudflared package
      ansible.builtin.apt:
        name: "{{ cloudflare_tunnel_package_name }}={{ cloudflare_tunnel_version }}"
        state: present
        update_cache: true
      register: cloudflare_tunnel_package_result
      when: not (ansible_check_mode and cloudflare_tunnel_repository_result is changed)

    - name: Create cloudflare system group
      ansible.builtin.group:
        name: "{{ cloudflare_tunnel_group }}"
        system: true
        state: present

    - name: Create cloudflare system user
      ansible.builtin.user:
        name: "{{ cloudflare_tunnel_user }}"
        group: "{{ cloudflare_tunnel_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: /nonexistent
        create_home: false
        state: present

    - name: Ensure cloudflared token directory exists
      ansible.builtin.file:
        path: "{{ cloudflare_tunnel_token_file | dirname }}"
        state: directory
        owner: root
        group: "{{ cloudflare_tunnel_group }}"
        mode: "0710"

    - name: Remove legacy cloudflared environment file
      ansible.builtin.file:
        path: /etc/default/cloudflared
        state: absent

    - name: Write cloudflared tunnel token file
      ansible.builtin.copy:
        dest: "{{ cloudflare_tunnel_token_file }}"
        owner: root
        group: "{{ cloudflare_tunnel_group }}"
        mode: "0640"
        content: "{{ cloudflare_tunnel_token }}"
      no_log: true
      notify: Restart cloudflared

    - name: Write cloudflared systemd unit
      ansible.builtin.copy:
        dest: "{{ cloudflare_tunnel_systemd_unit_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Cloudflare Tunnel
          After=network-online.target traefik.service
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ cloudflare_tunnel_user }}
          Group={{ cloudflare_tunnel_group }}
          ExecStart={{ cloudflare_tunnel_binary_path }} tunnel --metrics {{ cloudflare_tunnel_metrics_addr }} run --url {{ cloudflare_tunnel_origin_url }} --token-file {{ cloudflare_tunnel_token_file }}
          Restart=always
          RestartSec=5s

          # Hardening
          NoNewPrivileges=true
          ProtectSystem=strict
          PrivateTmp=true
          PrivateDevices=true
          CapabilityBoundingSet=
          ReadOnlyPaths={{ cloudflare_tunnel_token_file }}

          [Install]
          WantedBy=multi-user.target
      notify: Restart cloudflared

    - name: Ensure cloudflared service is enabled and started
      ansible.builtin.systemd:
        name: "{{ cloudflare_tunnel_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
      when: not (ansible_check_mode and (cloudflare_tunnel_repository_result is changed or (cloudflare_tunnel_package_result is defined and cloudflare_tunnel_package_result is changed)))
