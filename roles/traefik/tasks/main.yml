---
- name: Get installed traefik version
  ansible.builtin.command:
    cmd: "{{ traefik_bin_path }} version"
  register: _traefik_installed
  changed_when: false
  failed_when: false

- name: Set traefik needs update fact
  ansible.builtin.set_fact:
    _traefik_needs_update: >-
      {{ _traefik_installed.rc != 0 or
         traefik_version not in (_traefik_installed.stdout | default('')) }}

- name: Download traefik checksums
  ansible.builtin.get_url:
    url: "{{ traefik_checksum_url }}"
    dest: "{{ traefik_download_dir }}/traefik_v{{ traefik_version }}_checksums.txt"
    mode: "0644"
  when: _traefik_needs_update

- name: Extract checksum for target tarball
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      grep 'traefik_v{{ traefik_version }}_linux_{{ traefik_arch }}.tar.gz'
      {{ traefik_download_dir }}/traefik_v{{ traefik_version }}_checksums.txt
      | awk '{print $1}'
    executable: /bin/bash
  register: _traefik_checksum
  changed_when: false
  when: _traefik_needs_update

- name: Download traefik tarball
  ansible.builtin.get_url:
    url: "{{ traefik_tarball_url }}"
    dest: "{{ traefik_tarball_path }}"
    mode: "0644"
    checksum: "sha256:{{ _traefik_checksum.stdout }}"
  when: _traefik_needs_update

- name: Ensure traefik extract directory exists
  ansible.builtin.file:
    path: "{{ traefik_download_dir }}/traefik_extract"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: _traefik_needs_update

- name: Extract traefik binary
  ansible.builtin.unarchive:
    src: "{{ traefik_tarball_path }}"
    dest: "{{ traefik_download_dir }}/traefik_extract"
    remote_src: true
  when: _traefik_needs_update

- name: Install traefik binary
  ansible.builtin.copy:
    src: "{{ traefik_download_dir }}/traefik_extract/traefik"
    dest: "{{ traefik_bin_path }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when: _traefik_needs_update
  notify: Restart traefik

- name: Create traefik system user
  ansible.builtin.user:
    name: traefik
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Ensure traefik config directory exists
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}"
    state: directory
    owner: root
    group: traefik
    mode: "0750"

- name: Ensure traefik log directory exists
  ansible.builtin.file:
    path: "{{ traefik_log_dir }}"
    state: directory
    owner: traefik
    group: adm
    mode: "0750"

- name: Configure logrotate for traefik
  ansible.builtin.copy:
    dest: /etc/logrotate.d/traefik
    content: |
      {{ traefik_log_dir }}/*.log {
          daily
          missingok
          rotate 14
          compress
          delaycompress
          notifempty
          create 0640 traefik adm
          sharedscripts
          postrotate
              systemctl kill -s USR1 traefik.service 2>/dev/null || true
          endscript
      }
    owner: root
    group: root
    mode: "0644"

- name: Deploy traefik static configuration
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_path }}"
    owner: root
    group: traefik
    mode: "0640"
  notify: Restart traefik

- name: Deploy traefik systemd unit
  ansible.builtin.template:
    src: traefik.service.j2
    dest: "/etc/systemd/system/{{ traefik_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Ensure traefik service is enabled and started
  ansible.builtin.systemd:
    name: "{{ traefik_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
