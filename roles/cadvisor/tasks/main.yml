---
- name: Ensure cAdvisor system group exists
  ansible.builtin.group:
    name: "{{ cadvisor_group }}"
    system: true
    state: present

- name: Ensure cAdvisor system user exists
  ansible.builtin.user:
    name: "{{ cadvisor_user }}"
    group: "{{ cadvisor_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Inspect Docker socket ownership for cAdvisor access
  ansible.builtin.stat:
    path: "{{ cadvisor_docker_socket }}"
  register: cadvisor_docker_socket_stat
  changed_when: false

- name: Ensure Docker socket exists for cAdvisor
  ansible.builtin.assert:
    that:
      - cadvisor_docker_socket_stat.stat.exists
      - cadvisor_docker_socket_stat.stat.gr_name is defined
    fail_msg: "Docker socket {{ cadvisor_docker_socket }} must exist before configuring cAdvisor."

- name: Ensure cAdvisor user can read the Docker socket group
  ansible.builtin.user:
    name: "{{ cadvisor_user }}"
    groups:
      - "{{ cadvisor_docker_socket_stat.stat.gr_name }}"
    append: true
  when: cadvisor_docker_socket_stat.stat.gr_name != cadvisor_group

- name: Download cAdvisor binary
  ansible.builtin.get_url:
    url: "https://github.com/google/cadvisor/releases/download/v{{ cadvisor_version }}/cadvisor-v{{ cadvisor_version }}-linux-amd64"
    dest: "{{ cadvisor_binary_path }}"
    checksum: "{{ cadvisor_checksum }}"
    owner: root
    group: root
    mode: "0755"

- name: Deploy cAdvisor systemd unit
  ansible.builtin.template:
    src: cadvisor.service.j2
    dest: /etc/systemd/system/cadvisor.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart cAdvisor

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start cAdvisor
  ansible.builtin.service:
    name: cadvisor
    enabled: true
    state: started
