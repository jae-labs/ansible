name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    env:
      ANSIBLE_ROLES_PATH: roles
    steps:
      - name: Honeycomb Buildevents
        uses: honeycombio/gha-buildevents@1dad608d8534ec0fdf57e7503ceb8256b5ddc531 # ratchet:honeycombio/gha-buildevents@v4.0.0
        with:
          apikey: ${{ secrets.HONEYCOMB_API_KEY }}
          dataset: gha-builds
          status: ${{ job.status }}

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # ratchet:actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install ansible-lint
        # Lint only needs the dev tool, not the runtime contract. Installing
        # requirements.txt here forces ansible-core==2.21.*, which collides
        # with the latest ansible-lint/ansible-compat on Python 3.14 (those
        # require ansible-core >= 2.20). The runtime contract is enforced by
        # bootstrap.sh on the OCI host, not by this job.
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint
