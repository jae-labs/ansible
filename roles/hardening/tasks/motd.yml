---
- name: Configure motd banner
  ansible.builtin.template:
    src: warning_banner.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"

- name: Deploy dynamic MOTD warning script
  ansible.builtin.copy:
    src: 99-sysadmin-warning
    dest: /etc/update-motd.d/99-sysadmin-warning
    owner: root
    group: root
    mode: "0755"

- name: Remove unwanted MOTD entries
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/update-motd.d/50-landscape-sysinfo

- name: Disable default MOTD scripts
  ansible.builtin.file:
    path: "/etc/update-motd.d/{{ item }}"
    mode: "0644"
  loop:
    - 00-header
    - 10-help-text
    - 50-motd-news
    - 85-fwupd
    - 90-updates-available
    - 91-contract-ua-esm-status
    - 91-release-upgrade
    - 92-unattended-upgrades
    - 95-hwe-eol
    - 97-overlayroot
    - 98-fsck-at-reboot
    - 98-reboot-required
  failed_when: false

- name: Disable motd-news services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: stopped
    masked: true
  loop:
    - motd-news.service
    - motd-news.timer
  failed_when: false

- name: Disable dynamic MOTD in sshd PAM
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    backrefs: true
  loop:
    - { regexp: '(session\\s+optional\\s+pam_motd.so\\s+motd=/run/motd.dynamic)', line: '# \\1' }
    - { regexp: '(session\\s+optional\\s+pam_motd.so noupdate)', line: '# \\1' }
  when: hardening_disable_dynamic_motd | bool
