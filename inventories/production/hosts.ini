# Production inventory (static fallback / placeholder).
#
# The active production inventory is `oci.oci.yml` in this directory, which
# uses the `oracle.oci.oci` dynamic inventory plugin. Ansible picks the
# dynamic plugin first; this file is a placeholder for static hosts and is
# only used when `oci.oci.yml` is removed or replaced.
#
# To target a specific host statically, add it under [production] below.
# SSH connection parameters match the dynamic plugin output (`display_name`
# is mapped to `ansible_host` there).
#
# Example:
#   [production]
#   oci-prod-1.justanother.engineer ansible_host=oci-prod-1.justanother.engineer ansible_user=ubuntu

[production]
