- name: Remove legacy Docker APT repository file
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: "{{ docker_apt_keyring_path | dirname }}"
    state: directory
    mode: "0755"

- name: Download Docker official GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_repo_url }}/gpg"
    dest: "{{ docker_apt_keyring_path }}"
    mode: "0644"

- name: Add Docker stable APT repository
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: ["{{ docker_apt_repo_url }}"]
    suites: ["{{ ansible_facts.distribution_release }}"]
    components: [stable]
    architectures: [amd64]
    signed_by: "{{ docker_apt_keyring_path }}"
    state: present
  register: docker_repository_result

- name: Install Docker and components
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
  register: docker_package_result
  when: not (ansible_check_mode and docker_repository_result is changed)

- name: Ensure userns-remap system group exists
  ansible.builtin.group:
    name: "{{ docker_userns_remap_user }}"
    system: true
    state: present
  when: docker_userns_remap | length > 0

- name: Ensure userns-remap system user exists
  ansible.builtin.user:
    name: "{{ docker_userns_remap_user }}"
    group: "{{ docker_userns_remap_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  when: docker_userns_remap | length > 0

- name: Ensure subordinate UID mapping for userns-remap
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ docker_userns_remap_user }}:"
    line: "{{ docker_userns_remap_user }}:{{ docker_userns_remap_subuid_start }}:{{ docker_userns_remap_subuid_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"
  when: docker_userns_remap | length > 0

- name: Ensure subordinate GID mapping for userns-remap
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ docker_userns_remap_user }}:"
    line: "{{ docker_userns_remap_user }}:{{ docker_userns_remap_subuid_start }}:{{ docker_userns_remap_subuid_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"
  when: docker_userns_remap | length > 0

- name: Ensure Docker configuration directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Ensure docker service is enabled and started
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: not (ansible_check_mode and (docker_repository_result is changed or docker_package_result is changed))

- name: Ensure containerd service is enabled and started
  ansible.builtin.service:
    name: containerd
    enabled: true
    state: started
  when: not (ansible_check_mode and (docker_repository_result is changed or docker_package_result is changed))
