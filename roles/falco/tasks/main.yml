---
- name: Remove legacy Falco GPG key with incorrect extension
  ansible.builtin.file:
    path: /usr/share/keyrings/falco-archive-keyring.gpg
    state: absent

- name: Add Falco official GPG key
  ansible.builtin.get_url:
    url: "{{ falco_apt_gpg_key_url }}"
    dest: "{{ falco_apt_keyring_path }}"
    owner: root
    group: root
    mode: '0644'

- name: Add Falco official APT repository
  ansible.builtin.deb822_repository:
    name: falcosecurity
    types: [deb]
    uris: ["{{ falco_apt_repo_url }}"]
    suites: [stable]
    components: [main]
    signed_by: "{{ falco_apt_keyring_path }}"
    state: present

- name: Install Falco packages
  ansible.builtin.apt:
    name: "falco={{ falco_version }}"
    state: present
    update_cache: true
  register: falco_package_result

- name: Copy Falco configuration
  ansible.builtin.template:
    src: falco.yaml.j2
    dest: /etc/falco/falco.yaml
    owner: root
    group: root
    mode: '0644'
  notify: Restart falco-modern-bpf

- name: Configure logrotate for Falco
  ansible.builtin.template:
    src: logrotate-falco.j2
    dest: /etc/logrotate.d/falco
    owner: root
    group: root
    mode: '0644'

- name: Ensure default falco service is stopped and disabled
  ansible.builtin.systemd:
    name: falco
    state: stopped
    enabled: false
  failed_when: false

- name: Ensure falco-modern-bpf service is enabled and started
  ansible.builtin.systemd:
    name: "{{ falco_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  when: not (ansible_check_mode and falco_package_result is changed)
