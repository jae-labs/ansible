---
- name: Resolve current mount information
  ansible.builtin.set_fact:
    hardening_current_mountinfo: "{{ ansible_facts.mounts | selectattr('mount', 'equalto', item.path) | list | first | default({}) }}"

- name: Ensure mount entry is present
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ item.src | default(hardening_current_mountinfo.device, true) }}"
    fstype: "{{ item.fstype | default(hardening_current_mountinfo.fstype, true) }}"
    opts: "{{ item.opts }}"
    state: present
  register: hardening_mount_result
  when:
    - item.enabled | bool
    - item.path in hardening_mount_points
  notify: Remount hardening filesystems

- name: Ensure mount directory permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    state: directory
  when: item.path in hardening_mount_points

- name: Track changed mount points
  ansible.builtin.set_fact:
    hardening_changed_mounts: "{{ (hardening_changed_mounts | default([])) + [item.path] }}"
  when:
    - hardening_mount_result is defined
    - hardening_mount_result.changed
