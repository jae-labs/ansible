---
- name: Configure login.defs password policy
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^PASS_MAX_DAYS|^#PASS_MAX_DAYS', line: 'PASS_MAX_DAYS {{ hardening_password_max_days }}' }
    - { regexp: '^PASS_MIN_DAYS|^#PASS_MIN_DAYS', line: 'PASS_MIN_DAYS {{ hardening_password_min_days }}' }
    - { regexp: '^PASS_WARN_AGE|^#PASS_WARN_AGE', line: 'PASS_WARN_AGE {{ hardening_password_warn_days }}' }
    - { regexp: '^ENCRYPT_METHOD|^#ENCRYPT_METHOD', line: 'ENCRYPT_METHOD {{ hardening_password_hash_algorithm | upper }}' }
    - { regexp: '^UMASK|^#UMASK', line: 'UMASK {{ hardening_umask }}' }
  loop_control:
    label: "{{ item.regexp }}"

- name: Ensure pwquality configuration directory exists
  ansible.builtin.file:
    path: /etc/security/pwquality.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure pwquality policy
  ansible.builtin.copy:
    dest: /etc/security/pwquality.conf.d/50-hardening.conf
    owner: root
    group: root
    mode: "0600"
    content: |
      difok = {{ hardening_password_difok }}
      minlen = {{ hardening_password_min_length }}
      minclass = {{ hardening_password_min_classes }}
      maxrepeat = {{ hardening_password_max_repeat }}
      maxsequence = {{ hardening_password_max_sequence }}
      dictcheck = {{ 1 if hardening_password_dictionary_check else 0 }}
      enforcing = {{ 1 if hardening_password_quality_enforce else 0 }}
      enforce_for_root = {{ 1 if hardening_password_enforce_root else 0 }}

- name: Configure default inactive password lock
  ansible.builtin.command: useradd -D -f {{ hardening_password_inactive_days }}
  changed_when: true
