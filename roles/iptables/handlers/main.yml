- name: Apply netfilter-persistent rules
  ansible.builtin.service:
    name: netfilter-persistent
    state: restarted

- name: Recreate docker iptables chains after firewall reload
  ansible.builtin.systemd:
    name: docker
    state: restarted
    daemon_reload: true
  failed_when: false
  listen: Apply netfilter-persistent rules
