---
- name: Ensure TuneD package is installed
  ansible.builtin.apt:
    name: "{{ tuned_package_name }}"
    state: present
  register: tuned_package_result

- name: Probe TuneD runtime files
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ tuned_adm_binary_path }}"
    - "{{ tuned_main_conf_path }}"
  register: tuned_runtime_files
  changed_when: false

- name: Set TuneD runtime availability fact
  ansible.builtin.set_fact:
    tuned_runtime_available: >-
      {{
        tuned_runtime_files.results
        | selectattr('item', 'equalto', tuned_adm_binary_path)
        | map(attribute='stat.exists')
        | first
        | default(false)
      }}
    tuned_main_conf_exists: >-
      {{
        tuned_runtime_files.results
        | selectattr('item', 'equalto', tuned_main_conf_path)
        | map(attribute='stat.exists')
        | first
        | default(false)
      }}

- name: List available TuneD profiles
  ansible.builtin.command:
    argv:
      - "{{ tuned_adm_binary_path }}"
      - list
  check_mode: false
  register: tuned_profile_list
  changed_when: false
  when: tuned_runtime_available | default(false)

- name: Ensure requested TuneD profile exists
  ansible.builtin.assert:
    that:
      - tuned_profile_list.stdout is search('(?m)^\\s*-\\s*' ~ (tuned_profile | regex_escape) ~ '\\s')
    fail_msg: "Requested TuneD profile {{ tuned_profile }} is not available on this host."
  when: tuned_runtime_available | default(false)

- name: Ensure TuneD main config disables dynamic tuning
  community.general.ini_file:
    path: "{{ tuned_main_conf_path }}"
    section: null
    option: dynamic_tuning
    value: "0"
    mode: "0644"
    no_extra_spaces: true
  register: tuned_main_conf_dynamic_tuning
  when: tuned_main_conf_exists | default(false)

- name: Restart TuneD when main config changes
  ansible.builtin.systemd_service:
    name: "{{ tuned_service_name }}"
    state: restarted
  when:
    - tuned_main_conf_exists | default(false)
    - tuned_main_conf_dynamic_tuning is changed

- name: Ensure TuneD service is enabled and started
  ansible.builtin.systemd_service:
    name: "{{ tuned_service_name }}"
    enabled: true
    state: started
  when: tuned_runtime_available | default(false)

- name: Probe active TuneD profile
  ansible.builtin.command:
    argv:
      - "{{ tuned_adm_binary_path }}"
      - active
  check_mode: false
  register: tuned_active_profile
  changed_when: false
  failed_when: >-
    tuned_active_profile.rc != 0 and
    'No current active profile.' not in (tuned_active_profile.stdout | default(''))
  when: tuned_runtime_available | default(false)

- name: Set current TuneD profile fact
  ansible.builtin.set_fact:
    tuned_active_profile_name: >-
      {{
        (
          tuned_active_profile.stdout | default('') |
          regex_replace('^Current active profile:\\s*', '') |
          trim
        )
        if (tuned_active_profile.stdout | default('')) is search('(?m)^Current active profile:\\s*')
        else ''
      }}
  when: tuned_runtime_available | default(false)

- name: Predict TuneD profile change in check mode
  ansible.builtin.debug:
    msg: >-
      TuneD profile would change from
      {{ tuned_active_profile_name | default('none') | default('none') }}
      to {{ tuned_profile }}
  changed_when: true
  when:
    - ansible_check_mode
    - tuned_runtime_available | default(false)
    - tuned_active_profile_name | default('') != tuned_profile

- name: Select requested TuneD profile when needed
  ansible.builtin.command:
    argv:
      - "{{ tuned_adm_binary_path }}"
      - profile
      - "{{ tuned_profile }}"
  register: tuned_profile_select
  changed_when: true
  when:
    - not ansible_check_mode
    - tuned_runtime_available | default(false)
    - tuned_active_profile_name | default('') != tuned_profile
